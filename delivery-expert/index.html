<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Store 9337 Training — Delivery Expert Certification</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700;900&family=Poppins:wght@700;800;900&display=swap" rel="stylesheet">
<style>
:root{--ink:#0E0F13;--panel:#171922;--line:#262A38;--red:#FF1A1A;--blue:#0060FF;--hblue:#1E9BF0;--tx:#F2F3F7;--dim:#8A8FA3}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--ink);color:var(--tx);font-family:'DM Sans',sans-serif}
nav{width:280px;background:var(--panel);border-right:1px solid var(--line);padding:22px 0;
  position:fixed;top:0;bottom:0;left:0;overflow-y:auto;z-index:20;transform:translateX(-100%);transition:transform .25s}
nav.open{transform:none}
.logo{padding:0 22px 18px;border-bottom:1px solid var(--line);margin-bottom:12px}
.logo b{font-family:'Poppins',sans-serif;font-weight:900;font-size:19px;line-height:1.15;display:block;color:var(--hblue)}
.logo b span{color:var(--red)}
.logo small{color:var(--dim);font-weight:700;font-size:11px;letter-spacing:1.6px}
.grp{color:var(--dim);font-weight:900;font-size:10.5px;letter-spacing:2px;padding:16px 22px 6px}
.item{display:block;padding:9px 22px;color:var(--tx);font-weight:500;font-size:14.5px;cursor:pointer;border-left:3px solid transparent;text-decoration:none}
.item:hover{background:#1D2030;border-left-color:var(--red)}
#burger{position:fixed;top:14px;left:14px;z-index:30;background:var(--red);border:none;
  border-radius:10px;width:48px;height:48px;color:#fff;font-size:22px;font-weight:900;cursor:pointer}
#scrim{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:15}
body.navopen #scrim{display:block}
main{max-width:1020px;margin:0 auto;padding:74px clamp(14px,3vw,44px) 40px}
.counter{text-align:center;color:var(--dim);font-weight:900;font-size:11px;letter-spacing:2px;margin-bottom:14px}
.pgimg{width:100%;display:block;border-radius:12px;box-shadow:0 4px 18px rgba(0,0,0,.5)}
.navbtns{display:flex;gap:12px;margin-top:18px}
.nb{flex:1;background:var(--panel);border:2px solid var(--line);border-radius:12px;color:var(--tx);
  font:900 15px 'DM Sans',sans-serif;padding:16px;cursor:pointer;text-align:center}
.nb:hover{border-color:var(--blue)} .nb:disabled{opacity:.3}
footer{background:#000;text-align:center;padding:24px;font-weight:900;font-size:19px}
footer span{color:var(--red)}
</style></head><body>
<button id="burger" onclick="tog()">&#9776;</button>
<div id="scrim" onclick="tog()"></div>
<nav id="nav">
<div class="logo"><b>DELIVERY EXPERT <span>CERTIFICATION</span></b><small>STORE 9337 · SKILLS CHECK BOOKLET</small></div>
<a class="item" href="../" style="border-left-color:var(--red);color:var(--red);font-weight:700">&#8592; ALL GUIDES</a>
<div class="grp">OVERVIEW</div>
<a class="item" onclick="jump(1)">Training Plan</a>
<a class="item" onclick="jump(2)">Training Resources</a>
<div class="grp">SKILLS CHECKS</div>
<a class="item" onclick="jump(3)">Delivery Expert</a>
<a class="item" onclick="jump(5)">Go Zone Product Expert</a>
</nav>
<main>
<div class="counter" id="counter"></div>
<img class="pgimg" id="pg" src="" alt="Delivery Expert certification booklet page">
<div class="navbtns">
<button class="nb" id="prev" onclick="step(-1)">&#9650; PREVIOUS</button>
<button class="nb" id="next" onclick="step(1)">NEXT &#9660;</button>
</div>
</main>
<footer>Dommm<span>ino's</span></footer>
<script>
const P=[];
for(let i=1;i<=8;i++){P.push('pages/p'+String(i).padStart(2,'0')+'.jpg');}
let i=0;
function render(){
 document.getElementById('pg').src=P[i];
 document.getElementById('counter').textContent='PAGE '+(i+1)+' OF '+P.length;
 document.getElementById('prev').disabled=i===0;
 document.getElementById('next').disabled=i===P.length-1;
 window.scrollTo({top:0});
}
function step(d){const n=i+d;if(n>=0&&n<P.length){i=n;render()}}
function jump(idx){i=idx;render();tog()}
function tog(){document.getElementById('nav').classList.toggle('open');document.body.classList.toggle('navopen')}
render();
</script>
<script data-goatcounter="https://store9337.goatcounter.com/count" async src="//gc.zgo.at/count.js"></script>
</body></html>
